version: 3.0-koopman
name: SAR_POD_V3_koopman
description: >
  Koopman random-search POD model. Per-target conditions scale an effective
  search width (W_eff). Track length is either measured (CalTopo) or estimated
  from area, spacing, and coverage. POD = 1 - exp(-(W_eff * L_total) / A).
units:
  distance: m
  area: m2
  probability: 0-1

targets:
  adult:
    group: active_missing_person
    W0_m: 21
  child:
    group: active_missing_person
    W0_m: 16
  large_clues:
    group: active_missing_person
    W0_m: 14
  small_clues:
    group: active_missing_person
    W0_m: 8
  intact_remains:
    group: evidence_historical
    W0_m: 20
  partially_skeletonized:
    group: evidence_historical
    W0_m: 12
  skeletal_remains:
    group: evidence_historical
    W0_m: 9
  large_evidence:
    group: evidence_historical
    W0_m: 12
  small_evidence:
    group: evidence_historical
    W0_m: 7

w_eff_bounds_m:
  min: 0.5
  max: 100

primary_target_hierarchy:
  active_missing_person:
    order:
    - adult
    - child
    - large_clues
    - small_clues
  evidence_historical:
    order:
    - intact_remains
    - partially_skeletonized
    - skeletal_remains
    - large_evidence
    - small_evidence

input_schema:
  search_level:
    type_of_search:
    - active_missing_person
    - evidence_historical
    searching_for:
      active_missing_person:
      - adult
      - child
      - large_clues
      - small_clues
      evidence_historical:
        remains_state:
        - intact_remains
        - partially_skeletonized
        - skeletal_remains
        evidence_classes:
        - large_evidence
        - small_evidence
    subject_responsiveness:
      auditory:
      - not expected
      - possible
      - likely
      visual:
      - expected to evade
      - not expected
      - possible
      - likely
    subject_visibility:
    - low
    - medium
    - high
  segment_level:
    conditions:
      time_of_day:
      - day
      - dusk_dawn
      - night
      weather:
      - clear
      - rain
      - snow
      vegetation_density: 1..5
      micro_terrain_complexity: 1..5
      extenuating_factors: 1..5
      burial_or_cover: 1..5
    execution:
      num_searchers: integer >= 1
      area_acres: number >= 0
      area_hectares: number >= 0
      area_m2: number >= 0
      critical_spacing_m: number > 0
      area_coverage_pct: number 0..100
      track_length_ind_m: number >= 0 (optional)

response_model:
  enabled_for_groups:
  - active_missing_person
  auditory_bonus:
    none: 0.0
    possible: 0.04
    likely: 0.08
  visual_bonus:
    evade: -0.10
    none: 0.0
    possible: 0.015
    likely: 0.05
  max_total_multiplier: 1.25

subject_visibility_factor:
