ui_tooltips:
  subject_visibility: How visible is the subject expected to be? Camouflaged or buried, bright clothing or open terrain.
  auditory: Subject likelihood to signal verbally.
  visual: Subject likelihood to signal visually.
  vegetation_density: Line-of-sight blockers such as tree and bush density, tall grass/brush, thick understory, canopy layering, slash/deadfall, and other vegetation that obscures the subject.
  micro_terrain_complexity: Terrain features that create hiding spots or visual clutter, like rocks/boulder fields, gullies and cutbanks, root wads, deadfall piles, depressions, animal burrows, and uneven ground.
  extenuating_factors: Catch-all for anything not already covered that makes detection easier or harder, such as heavy smoke/dust/fog, noise masking, altered landscape / disturbance, or searcher experience.
  burial_or_cover: Degree of burial or concealment by debris, snow, duff, or other covering material.
  track_length_ind: Use only if track length is determinable from CalTopo for this segment only. Tracks must be stopped at the start of the segment and stopped at the end of the segment (restart for each segment).
  num_searchers: Number of searchers operating in this segment.
  area: Total area of the search segment. Enter in acres OR hectares (not both).

formulas:
  condition_multiplier:
    text: "C_t = F_time * F_weather * F_visibility * F_veg * F_terrain * F_ext_or_burial\n"
  effective_search_width:
    text: "W_eff = clamp(W0_m * C_t * M_resp, w_eff_min, w_eff_max)\n"
  track_length_measured:
    text: "L_total = track_length_ind_m * num_searchers\n"
  track_length_estimated:
    text: "A_covered = area_m2 * (coverage_pct / 100)\nL_ind_est = A_covered / (critical_spacing_m * num_searchers)\nL_total_est = L_ind_est * num_searchers  (= A_covered / critical_spacing_m)\n"
  koopman_coverage:
    text: "coverage_C = (W_eff * L_total) / area_m2\n"
  final_pod:
    text: "POD_segment = clamp(1 - exp(-coverage_C), 0, 0.99)\n"

qa_flags:
  warn_if_critical_spacing_m_gt: 50
  warn_if_area_coverage_pct_lt: 50

calibration:
  notes:
  - W0_m values calibrated to approximate V2 baseline POD under equivalent conditions.
  - 'Calibration baseline: W0 = k * (-ln(1 - base_detectability)) * base_reference_spacing (from V2 config).'
  - Condition factors are identical to V2; they now scale W_eff instead of reference critical spacing.
  - Back-test on historical segments and adjust quarterly.
  - 'Adjust in order: W0_m per target, then condition_factors.'
  - Keep response bonuses small; they scale W_eff directly.
  - Do not allow POD to reach 1.00 (model clamps at 0.99).
  - 'Implementation note: numeric condition factor keys are strings ''1''..''5''; cast input to string for lookup.'
  - 'Implementation note: apply response_model only when target.group is in response_model.enabled_for_groups; otherwise M_resp = 1.0.'
  - 'Track length: if individual track length is provided (CalTopo), use L_total = L_ind * N. Otherwise estimate from area, spacing, coverage.'
  - '1 acre = 4046.8564224 m2. 1 hectare = 10000 m2.'

audit:
  save_inputs: true
  save_intermediate_values: true
  save_per_target_outputs: true
  fields_to_log:
  - selected_targets
  - primary_target_inferred
  - time_of_day
  - weather
  - num_searchers
  - area_m2
  - critical_spacing_m
  - area_coverage_pct
  - track_length_ind_m
  - track_source
  - L_total_m
  - W0_m
  - C_t
  - W_eff
  - M_resp
  - coverage_C
  - POD_segment
